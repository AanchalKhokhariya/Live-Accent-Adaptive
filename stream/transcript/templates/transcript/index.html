<!DOCTYPE html>
<html>
  <head>
    <title>Live Transcription</title>
  </head>
  <body>
  <h1>Transcribe Audio With Django</h1>

  <p id="status">Disconnected</p>
  <p id="transcript"></p>

  <button id="startBtn">Start Recording</button>
  <button id="stopBtn" disabled>Stop Recording</button>

  <script>
    let mediaRecorder;
    let socket;
    let stream;
    let chunks = [];

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    startBtn.onclick = async () => {

      socket = new WebSocket('ws://localhost:8000/listen/');

      socket.onopen = () => {
        document.getElementById("status").textContent = "Connected & Recording";
        console.log("WebSocket Connected");
      };

      socket.onmessage = (event) => {
        if (event.data) {
          document.getElementById("transcript").textContent += " " + event.data;
        }
      };

      socket.onerror = (error) => {
        console.log("WebSocket Error", error);
      };

      stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      mediaRecorder = new MediaRecorder(stream);

      // Collect chunks instead of sending immediately
      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
          chunks.push(event.data);
        }
      };

      mediaRecorder.onstop = async () => {
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const buffer = await blob.arrayBuffer();

        if (socket.readyState === 1) {
          socket.send(buffer);
        }

        chunks = []; // reset
      };

      mediaRecorder.start(); // NO time slice

      startBtn.disabled = true;
      stopBtn.disabled = false;
    };

    stopBtn.onclick = () => {

      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop(); // triggers onstop
      }

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }

      document.getElementById("status").textContent = "Processing...";

      startBtn.disabled = false;
      stopBtn.disabled = true;
    };
</script>
</body>
</html>
