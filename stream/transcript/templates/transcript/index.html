<!DOCTYPE html>
<html>

<head>
  <title>Live Transcription</title>
</head>

<body>
  <h1>Transcribe Audio With Django</h1>

  <p id="status">Disconnected</p>

  <button id="startBtn">Start Recording</button>
  <button id="stopBtn" disabled>Stop Recording</button>
  <button id="downloadBtn">Save as File</button>
  <textarea id="transcript" rows="10" style="
    width: 60%;
    max-width: 600px;
    margin-top: 20px;
    display: block;
    resize: vertical;
    padding: 10px;
    font-size: 16px;
  ">
  </textarea>

  <p id="saveStatus" style="font-size:14px; color:green;"></p>
  <script>
    let mediaRecorder;
    let socket;
    let stream;
    let chunks = [];

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    startBtn.onclick = async () => {

      socket = new WebSocket('ws://localhost:8000/listen/');

      socket.onopen = () => {
        document.getElementById("status").textContent = "Connected & Recording";
        console.log("WebSocket Connected");
      };

      socket.onmessage = (event) => {
        if (event.data) {
          const transcriptBox = document.getElementById("transcript");
          transcriptBox.value += " " + event.data;
          transcriptBox.dispatchEvent(new Event("input"));
          transcriptBox.scrollTop = transcriptBox.scrollHeight;
        }
      };

      socket.onerror = (error) => {
        console.log("WebSocket Error", error);
      };

      stream = await navigator.mediaDevices.getUserMedia({ audio: true }); //user permission

      mediaRecorder = new MediaRecorder(stream); //records audio

      //Collect chunks instead of sending immediately
      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
          chunks.push(event.data);
        }
      };

      mediaRecorder.onstop = async () => {
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const buffer = await blob.arrayBuffer();

        if (socket.readyState === 1) {
          socket.send(buffer);
        }

        chunks = []; // reset
      };

      mediaRecorder.start(); // NO time slice

      startBtn.disabled = true;
      stopBtn.disabled = false;
    };

    stopBtn.onclick = () => {

      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop(); // triggers onstop
      }

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }

      document.getElementById("status").textContent = "Processing...";

      startBtn.disabled = false;
      stopBtn.disabled = true;
    };

    const transcriptBox = document.getElementById("transcript");
    const saveStatus = document.getElementById("saveStatus");

    // Load saved transcript when page loads
    window.onload = () => {
      const savedText = localStorage.getItem("transcript_data");
      if (savedText) {
        transcriptBox.value = savedText;
      }
    };

    // Auto-save when user types
    transcriptBox.addEventListener("input", () => {
      localStorage.setItem("transcript_data", transcriptBox.value);

      saveStatus.textContent = "Auto-saved...";

      setTimeout(() => {
        saveStatus.textContent = "";
      }, 1500);
    });

    const downloadBtn = document.getElementById("downloadBtn");

    downloadBtn.onclick = () => {
      const text = transcriptBox.value;

      if (!text.trim()) {
        alert("Transcript is empty!");
        return;
      }

      const blob = new Blob([text], { type: "text/plain" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;

      // Create filename with date & time
      const now = new Date();
      const filename = `transcript_${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}_${now.getHours()}-${now.getMinutes()}.txt`;

      a.download = filename;
      document.body.appendChild(a);
      a.click();

      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };
  </script>
</body>

</html>
