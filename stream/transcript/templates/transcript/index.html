<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Transcription Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .transcription-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      padding: 2rem;
      width: 100%;
      max-width: 800px;
    }

    .status-badge {
      font-size: 0.85rem;
      padding: 0.5em 1em;
      border-radius: 50px;
      transition: all 0.3s ease;
    }

    .recording-active {
      background-color: #fee2e2;
      color: #dc2626;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    #transcript {
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.5rem;
      font-size: 1.1rem;
      line-height: 1.6;
      background-color: #f8fafc;
      transition: border-color 0.2s;
      resize: none;
    }

    #transcript:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .btn-action {
      border-radius: 10px;
      padding: 10px 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.1s;
    }

    .btn-action:active {
      transform: scale(0.96);
    }

    #saveStatus {
      height: 20px;
      font-weight: 500;
    }
  </style>
</head>

<body>

  <div class="container d-flex justify-content-center">
    <div class="transcription-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0 text-primary">
          <i class="bi bi-mic-fill me-2"></i>Live Transcribe
        </h2>
        <span id="status" class="status-badge bg-light text-muted border">
          <i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i> Disconnected
        </span>
      </div>

      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-end mb-2">
          <label for="transcript" class="form-label fw-semibold text-secondary">Real-time Transcript</label>
          <p id="saveStatus" class="text-success small m-0"></p>
        </div>
        <textarea id="transcript" class="form-control" rows="12" placeholder="Start recording to see the magic happen..."></textarea>
      </div>

      <div class="row g-2">
        <div class="col-6 col-md-3">
          <button id="startBtn" class="btn btn-success btn-action w-100">
            <i class="bi bi-play-fill"></i> Start
          </button>
        </div>
        <div class="col-6 col-md-3">
          <button id="stopBtn" class="btn btn-danger btn-action w-100" disabled>
            <i class="bi bi-stop-fill"></i> Stop
          </button>
        </div>
        <div class="col-6 col-md-3">
          <button id="downloadBtn" class="btn btn-primary btn-action w-100">
            <i class="bi bi-download"></i> Save File
          </button>
        </div>
        <div class="col-6 col-md-3">
          <button id="clearBtn" class="btn btn-outline-secondary btn-action w-100">
            <i class="bi bi-trash"></i> Clear
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let mediaRecorder;
    let socket;
    let stream;
    let chunks = [];

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusLabel = document.getElementById("status");
    const transcriptBox = document.getElementById("transcript");
    const saveStatus = document.getElementById("saveStatus");

    startBtn.onclick = async () => {
      socket = new WebSocket('ws://localhost:8000/listen/');

      socket.onopen = () => {
        statusLabel.textContent = "Recording...";
        statusLabel.className = "status-badge recording-active";
        console.log("WebSocket Connected");
      };

      socket.onmessage = (event) => {
        if (event.data) {
          transcriptBox.value += (transcriptBox.value ? " " : "") + event.data;
          transcriptBox.dispatchEvent(new Event("input"));
          transcriptBox.scrollTop = transcriptBox.scrollHeight;
        }
      };

      socket.onerror = (error) => {
        console.log("WebSocket Error", error);
        statusLabel.textContent = "Error Connection";
        statusLabel.className = "status-badge bg-danger text-white";
      };

      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            chunks.push(event.data);
          }
        };

        mediaRecorder.onstop = async () => {
          const blob = new Blob(chunks, { type: 'audio/webm' });
          const buffer = await blob.arrayBuffer();
          if (socket.readyState === 1) {
            socket.send(buffer);
          }
          chunks = [];
        };

        mediaRecorder.start();
        startBtn.disabled = true;
        stopBtn.disabled = false;
      } catch (err) {
        alert("Microphone access denied or not available.");
      }
    };

    stopBtn.onclick = () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      }
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
      statusLabel.textContent = "Processing...";
      statusLabel.className = "status-badge bg-info text-white";
      startBtn.disabled = false;
      stopBtn.disabled = true;
    };

    // Auto-save & Local Storage Logic
    window.onload = () => {
      const savedText = localStorage.getItem("transcript_data");
      if (savedText) transcriptBox.value = savedText;
    };

    transcriptBox.addEventListener("input", () => {
      localStorage.setItem("transcript_data", transcriptBox.value);
      saveStatus.innerHTML = '<i class="bi bi-cloud-check"></i> Saved';
      setTimeout(() => { saveStatus.textContent = ""; }, 2000);
    });

    document.getElementById("downloadBtn").onclick = () => {
      const text = transcriptBox.value;
      if (!text.trim()) return alert("Transcript is empty!");
      
      const blob = new Blob([text], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const now = new Date();
      a.href = url;
      a.download = `transcript_${now.toISOString().slice(0,16).replace('T','_')}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    };

    document.getElementById("clearBtn").onclick = () => {
      if (!transcriptBox.value.trim()) return;
      if (confirm("Are you sure you want to clear the transcript?")) {
        transcriptBox.value = "";
        localStorage.removeItem("transcript_data");
        saveStatus.textContent = "Cleared";
        setTimeout(() => { saveStatus.textContent = ""; }, 1500);
      }
    };
  </script>
</body>
</html>
